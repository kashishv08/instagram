{% load static %}
<link rel="stylesheet" href="{% static 'stories.css' %}" />

<div class="stories-row">
  <!-- Your Story -->
  <div class="story-item">
    <div class="your-story-wrap">
      <div style="border-radius:50%;padding:2px;background:#1a1a1a;">
        <div class="story-ring-inner">
          {% if request.user.is_authenticated and request.user.profile.avatar %}
          <img src="{{ request.user.profile.avatar.url }}" alt="Your story" />
          {% else %}
          <img src="https://picsum.photos/seed/myprofile/56/56" alt="Your story" />
          {% endif %}
        </div>
      </div>
      <span class="your-story-plus">+</span>
    </div>
    <span class="story-name">Your story</span>
  </div>
