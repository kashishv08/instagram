<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    {% if messages %}
    <div class="toast toast-end z-50">
      {% for msg in messages %}
      <div class="alert alert-{{msg.tags}}">
        <span>{{msg}}</span>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    <div
      class="max-w-md mx-auto mt-10 bg-white p-8 border border-slate-200 rounded-xl shadow-sm"
    >
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 mb-4"
        >
          <span class="material-icons-outlined text-2xl">person_add</span>
        </div>
        <h2 class="text-2xl font-bold text-slate-900">
          {% if is_login %}
          <h2>Login</h2>
          {% else %}
          <h2>Create an Account</h2>
          {% endif %}
        </h2>
      </div>

      <form
        method="POST"
        action="{% if is_login %} {% url 'login-user' %} {% else %} {% url 'register-user' %} {% endif %}"
        class="space-y-5"
      >
        {% csrf_token %}
        <div>
          <label
            for="{form.username.id_for_label}"
            class="block text-sm font-medium text-slate-700 mb-1.5"
            >{{form.username.label}}</label
          >
          <!-- <input
            type="text"
            id="username"
            name="username"
            required
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-sm outline-none"
            placeholder="Enter your username"
          /> -->
          {{form.username}}
        </div>

        <div>
          <label
            for="{form.password.id_for_label}"
            class="block text-sm font-medium text-slate-700 mb-1.5"
            >{{form.password.label}}</label
          >
          <!-- <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-sm outline-none"
            placeholder="Enter your password"
          /> -->
          {{form.password}}
        </div>

        <div class="pt-2">
          <button
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2"
          >
            {% if is_login %}
            <h2>Login</h2>
            {% else %}
            <h2>Register</h2>
            {% endif %}
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
