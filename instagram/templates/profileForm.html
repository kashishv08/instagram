<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    {% if messages %}
    <div class="toast toast-end z-50">
      {% for msg in messages %}
      <div class="alert alert-{{msg.tags}}">
        <span>{{msg}}</span>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    <div
      class="max-w-md mx-auto mt-10 bg-white p-8 border border-slate-200 rounded-xl shadow-sm"
    >
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 mb-4"
        ></div>
        <h2 class="text-2xl font-bold text-slate-900">
          <h2>Create Your Profile</h2>
        </h2>
      </div>
      <form
        action="{% url 'create-profile' %}"
        method="POST"
        enctype="multipart/form-data"
      >
        {% csrf_token %} {{form.as_div}}
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2"
        >
          create profile
        </button>
      </form>
    </div>
  </body>
</html>
